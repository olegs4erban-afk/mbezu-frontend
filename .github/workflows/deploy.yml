name: build-audit-deploy

# Push to main → quality gate (typecheck/lint/build + Lighthouse budget) → deploy to
# Cloudflare Pages. The deploy step is INERT without secrets (skips cleanly), so this
# workflow is safe to commit before the repo/secrets exist.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - name: Lighthouse budget
        run: npx --yes @lhci/cli@0.14.x autorun
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    # secrets surfaced as env so the step `if` can gate on their presence (secrets
    # can't be referenced directly in `if`). Owner adds these as repo secrets:
    #   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID  (see DEPLOY.md §6)
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        if: ${{ env.CF_API_TOKEN != '' && env.CF_ACCOUNT_ID != '' }}
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: mbezu-frontend
          directory: dist
          branch: main
      - name: Note when secrets missing
        if: ${{ env.CF_API_TOKEN == '' || env.CF_ACCOUNT_ID == '' }}
        run: echo "::notice::Cloudflare secrets not set — deploy skipped (workflow inert). Add CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID to enable."
