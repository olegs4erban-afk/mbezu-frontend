// imageOf(art, size) — получить URL фото работы
function imageOf(art, size) {
  size = size || 'md';
  if (!art || !art.id) return '';
  const set = TILDA_IMAGES[art.id];
  return set ? (set[size] || set.md || '') : '';
}

// ═══════════════════════════════════════════════════════════
// PaintingPlate v2 — с поддержкой реальных фото с Tilda CDN
// Если фото есть в TILDA_IMAGES — рендерим <img>, иначе fallback на градиент
// ═══════════════════════════════════════════════════════════
function PaintingPlate({ art, fit, ratio, showMeta = true, style, onClick }) {
  if (!art) return null;
  const url = imageOf(art, 'md');
  const isTondo = art.series === 'tondi';
  const aspectRatio = ratio || (fit === 'bare' ? undefined : `${art.w} / ${art.h}`);

  // Если есть фото — рендерим <img>
  if (url) {
    return (
      <div 
        style={{
          width: '100%',
          aspectRatio,
          borderRadius: isTondo ? '50%' : 'var(--r-md)',
          overflow: 'hidden',
          boxShadow: 'var(--shadow-md)',
          cursor: onClick ? 'pointer' : 'default',
          background: '#d9cfba',
          ...style,
        }}
        onClick={onClick}
      >
        <img 
          src={url}
          alt={art.title || art.id}
          loading="lazy"
          referrerPolicy="no-referrer"
          crossOrigin="anonymous"
          onError={(e) => {
            // Если фото не загрузилось — скрываем img, чтобы был виден bg плитки
            e.currentTarget.style.display = 'none';
            const parent = e.currentTarget.parentElement;
            if (parent && !parent.dataset.failover) {
              parent.dataset.failover = '1';
              const palette = (art.palette && art.palette.length === 2) ? art.palette : ['#d9cfba', '#5a4a36'];
              parent.style.background = `linear-gradient(135deg, ${palette[0]} 0%, ${palette[1]} 100%)`;
            }
          }}
          style={{
            width: '100%',
            height: '100%',
            objectFit: 'cover',
            display: 'block',
            transition: 'transform .6s cubic-bezier(.2,.7,.2,1)',
          }}
        />
      </div>
    );
  }

  // Fallback — градиент-плашка (для ST-01, ST-02, TS-01 пока без фото)
  const [c1, c2] = art.palette || ['#d9cfba', '#5a4a36'];
  const baseStyle = {
    aspectRatio,
    width: '100%',
    background: `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`,
    borderRadius: isTondo ? '50%' : 'var(--r-md)',
    boxShadow: 'var(--shadow-md)',
    cursor: onClick ? 'pointer' : 'default',
    ...style,
  };
  return (
    <div className="ph-art" style={baseStyle} onClick={onClick}>
      {showMeta && art.id && (
        <div className="ph-meta">
          <span>[{art.id}]</span>
          <span>{art.w}×{art.h} см</span>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// ar.jsx — AR-функционал на базе <model-viewer>.
// AR Quick Look (iOS) + Scene Viewer (Android) + 3D на desktop.
// ─────────────────────────────────────────────────────────────

// ── Detect platform ──────────────────────────────────────────
function detectPlatform() {
  if (typeof navigator === 'undefined') return 'unknown';
  const ua = navigator.userAgent || '';
  if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'ios';
  if (/android/i.test(ua)) return 'android';
  return 'desktop';
}

function useArSupport() {
  const [state, setState] = React.useState({ platform: 'unknown', ready: false });
  React.useEffect(() => { setState({ platform: detectPlatform(), ready: true }); }, []);
  return state;
}

// ── Build asset paths (placeholder для финальных файлов) ─────
// Когда у нас будут реальные .glb / .usdz файлы — положим их в /assets/ar/<id>.{glb|usdz}
function arAssets(art) {
  if (!art) return null;
  const base = `assets/ar/${art.id.toLowerCase()}`;
  return {
    glb:  `${base}.glb`,    // Android Scene Viewer + desktop 3D
    usdz: `${base}.usdz`,   // iOS Quick Look
    ready: false,           // → true когда файлы реально лежат рядом
    title: art.title,
    artist: 'Mila Bezú',
    w: art.w,
    h: art.h,
  };
}

// ── QR-код через бесплатный сервис (для desktop fallback) ───
function qrUrl(url, size = 280) {
  const u = encodeURIComponent(url);
  return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${u}&margin=0&color=2a2520&bgcolor=f5efe2`;
}

// ── ArViewer — обёртка над <model-viewer> ───────────────────
function ArViewer({ art, style, autoRotate = true, controls = true }) {
  const assets = arAssets(art);
  if (!assets) return null;

  // Fallback пока нет реальных .glb/.usdz — показываем placeholder
  if (!assets.ready) {
    return (
      <div style={{
        position: 'relative', width: '100%', height: '100%',
        background: `linear-gradient(135deg, ${(art.palette || ['#d9cfba'])[0]}, ${(art.palette || ['#5a4a36','#5a4a36'])[1]})`,
        borderRadius: 'var(--r-md)', overflow: 'hidden',
        display: 'grid', placeItems: 'center',
        ...style,
      }}>
        <div style={{ textAlign: 'center', color: 'rgba(245,239,226,.88)', padding: 32 }}>
          <div className="mono" style={{ fontSize: 10, letterSpacing: '.32em', marginBottom: 14, opacity: .7 }}>
            3D · AR-MODEL
          </div>
          <div className="display" style={{ fontSize: 28, fontWeight: 500, letterSpacing: '-.02em' }}>{art.title}</div>
          <div className="mono" style={{ fontSize: 10, letterSpacing: '.18em', marginTop: 14, opacity: .7 }}>
            {art.w} × {art.h} см · placeholder
          </div>
          <div className="mono" style={{
            marginTop: 24, fontSize: 9.5, letterSpacing: '.16em',
            padding: '6px 14px', background: 'rgba(0,0,0,.25)',
            borderRadius: 'var(--r-pill)', display: 'inline-block',
          }}>
            ▶ AR-готовность: ждём .glb/.usdz
          </div>
        </div>
      </div>
    );
  }

  // Когда файлы готовы — рендерим настоящий model-viewer
  return React.createElement('model-viewer', {
    src: assets.glb,
    'ios-src': assets.usdz,
    alt: `${assets.title} — масло, ${art.w}×${art.h} см`,
    ar: true,
    'ar-modes': 'webxr scene-viewer quick-look',
    'ar-scale': 'fixed',
    'camera-controls': controls,
    'auto-rotate': autoRotate,
    'shadow-intensity': 0.8,
    'environment-image': 'neutral',
    poster: '',
    style: { width: '100%', height: '100%', ...style },
  });
}

// ── ArButton — кнопка-CTA «Попробовать на стене» ────────────
function ArButton({ art, label, small }) {
  const { platform, ready } = useArSupport();
  const assets = arAssets(art);
  if (!ready || !assets) return null;

  const text = label || (platform === 'ios' ? 'Открыть на iPhone' :
                         platform === 'android' ? 'Открыть на Android' :
                         'Примерить на стене');

  // На мобильном — нативная AR-ссылка (когда файлы готовы)
  if (platform === 'ios' && assets.ready) {
    return (
      <a className="ar-btn" rel="ar" href={assets.usdz}>
        <span className="ar-icon">▣</span>
        <span>{text}</span>
      </a>
    );
  }
  if (platform === 'android' && assets.ready) {
    const intent = `intent://arvr.google.com/scene-viewer/1.0?file=${encodeURIComponent(window.location.origin + '/' + assets.glb)}&mode=ar_preferred&title=${encodeURIComponent(assets.title)}#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;end;`;
    return (
      <a className="ar-btn" href={intent}>
        <span className="ar-icon">▣</span>
        <span>{text}</span>
      </a>
    );
  }

  // На desktop / при отсутствии файлов — кнопка-плашка
  return (
    <button
      className="ar-btn"
      onClick={() => {
        const el = document.getElementById('ar-block');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }}
      style={small ? { padding: '14px 22px', fontSize: 11 } : undefined}
    >
      <span className="ar-icon" style={small ? { width: 28, height: 28, fontSize: 12 } : undefined}>▣</span>
      <span>{text}</span>
    </button>
  );
}

// ── QrBlock — QR + инструкция «Отсканируйте телефоном» ──────

  const url = typeof window !== 'undefined'

      <div style={{
        display: 'flex', gap: 56,
        animation: `marquee ${big ? 48 : 32}s linear infinite`,
        whiteSpace: 'nowrap',
      }}>
        {stream.map((t, i) => (
          <span key={i} style={{
            fontFamily: 'var(--display)',
            fontSize: big ? 'clamp(36px, 5vw, 76px)' : 13,
            fontWeight: big ? 500 : 500,
            letterSpacing: big ? '-.025em' : '.16em',
            textTransform: big ? 'none' : 'uppercase',
            color: i % 2 === 0 ? 'var(--ink)' : 'var(--accent)',
            fontStyle: i % 2 === 0 ? 'normal' : 'italic',
          }}>{t}</span>
        ))}
      </div>
      <style>{`@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-33.33%); } }`}</style>

  );
}

// ═══════════════════════════════════════════════════════════
// app.jsx — Multipage version для Tilda
// Читает route из window.location.pathname
// Cart persists в localStorage между страницами
// ═══════════════════════════════════════════════════════════

const TWEAK_DEFAULTS = {
  "palette": "maison",
  "dark": false,
  "hero": "editorial",
  "density": "regular",
  "accent": "#b85c3a"
};

// pathToRoute — преобразует URL в route object
function pathToRoute() {
  const path = window.location.pathname.replace(/^\/+|\/+$/g, '');

  // Painting card: /painting/<slug>
  const mPainting = path.match(/^painting\/(.+)$/);
  if (mPainting) {
    return { name: 'painting', params: { id: mPainting[1].toUpperCase() } };
  }

  // Catalog с фильтром по серии: /catalog?series=monochrome
  if (path === 'catalog') {
    const series = new URLSearchParams(window.location.search).get('series');
    return { name: 'catalog', params: series ? { series } : {} };
  }

  // Прочие простые роуты
  const simpleRoutes = ['home', 'about', 'commission', 'cart', 'tracking', 'legal'];
  if (simpleRoutes.includes(path)) {
    return { name: path, params: {} };
  }

  // Default — главная
  return { name: 'home', params: {} };
}

// Преобразование route → URL
function routeToPath(name, params) {
  params = params || {};
  if (name === 'home') return '/home';
  if (name === 'painting' && params.id) return '/painting/' + params.id.toLowerCase();
  if (name === 'catalog' && params.series) return '/catalog?series=' + params.series;
  return '/' + name;
}

function App() {
  const [t] = typeof useTweaks === 'function' ? useTweaks(TWEAK_DEFAULTS) : [TWEAK_DEFAULTS, () => {}];
  const [route, setRoute] = React.useState(() => pathToRoute());
  
  // Cart — persist в localStorage
  const [cart, setCart] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('mbez-cart') || '[]'); }
    catch { return []; }
  });

  React.useEffect(() => {
    try { localStorage.setItem('mbez-cart', JSON.stringify(cart)); } catch {}
  }, [cart]);

  // Navigation — меняем URL (multipage)
  const go = (name, params = {}) => {
    const url = routeToPath(name, params);
    if (window.location.pathname + window.location.search === url) {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }
    window.location.href = url;
  };

  // Reaction на back/forward навигацию
  React.useEffect(() => {
    const onPop = () => setRoute(pathToRoute());
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  // Theme + accent
  React.useEffect(() => {
    const root = document.documentElement;
    root.dataset.theme = t.dark ? 'dark' : 'light';
    if (t.accent) root.style.setProperty('--accent', t.accent);
  }, [t]);

  const addToCart = (id) => setCart((c) => c.includes(id) ? c : [...c, id]);
  const removeFromCart = (id) => setCart((c) => c.filter((x) => x !== id));

  // Render по route
  let page;
  switch (route.name) {
    case 'home':       
      page = typeof HomePage === 'function' 
        ? <HomePage go={go} hero={t.hero} /> 
        : <FallbackPage name="home" />;
      break;
    case 'catalog':    
      page = typeof CatalogPage === 'function' 
        ? <CatalogPage go={go} density={t.density} initialSeries={route.params.series} /> 
        : <FallbackPage name="catalog" />;
      break;
    case 'painting':   
      page = typeof PaintingPage === 'function' 
        ? <PaintingPage go={go} id={route.params.id || ARTWORKS[0].id} addToCart={addToCart} /> 
        : <FallbackPage name="painting" id={route.params.id} />;
      break;
    case 'commission': 
      page = typeof CommissionPage === 'function' 
        ? <CommissionPage go={go} refId={route.params.ref} /> 
        : <FallbackPage name="commission" />;
      break;
    case 'cart':       
      page = typeof CartPage === 'function' 
        ? <CartPage go={go} cart={cart} removeFromCart={removeFromCart} /> 
        : <FallbackPage name="cart" />;
      break;
    case 'tracking':   
      page = typeof TrackingPage === 'function' 
        ? <TrackingPage go={go} /> 
        : <FallbackPage name="tracking" />;
      break;
    case 'about':      
      page = typeof AboutPage === 'function' 
        ? <AboutPage go={go} /> 
        : <FallbackPage name="about" />;
      break;
    default:           
      page = <FallbackPage name="404" />;
  }

  return (
    <>
      {typeof TopBar === 'function' && <TopBar route={route.name} go={go} cartCount={cart.length} />}
      <main>{page}</main>
      {typeof Footer === 'function' && <Footer go={go} />}
    </>
  );
}

// Fallback страница — для роутов где компонент не подключён в bundle
function FallbackPage({ name, id }) {
  return (
    <section style={{ padding: '120px 40px', maxWidth: 800, margin: '0 auto', textAlign: 'center' }}>
      <h1 className="display" style={{ fontSize: 48, fontWeight: 500, letterSpacing: '-.02em' }}>
        Страница «{name}» {id ? `(${id})` : ''}
      </h1>
      <p style={{ color: 'var(--ink-2)', marginTop: 16 }}>
        Эта страница пока заглушка. Скоро будет наполнена.
      </p>
      <a href="/home" className="btn btn-ghost" style={{ marginTop: 32, display: 'inline-flex' }}>
        ← На главную
      </a>
    </section>
  );
}

// Mount — ждём готовности DOM и наличия #root (работает в HEAD-вставке и на любой странице)
function __mbezMount() {
  const rootEl = document.getElementById('root');
  if (!rootEl) return;            // на этой странице нет #root — выходим тихо (например /catalog с Tilda Store)
  if (rootEl.__mbezMounted) return; // защита от двойного монтирования
  rootEl.__mbezMounted = true;
  ReactDOM.createRoot(rootEl).render(<App />);
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', __mbezMount);
} else {
  __mbezMount();
}


</script>
